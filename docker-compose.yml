services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trader}
      POSTGRES_USER: ${POSTGRES_USER:-trader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-change-me}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-development}
      TRADING_MODE: ${TRADING_MODE:-OFF}
      LIVE_ARMED: ${LIVE_ARMED:-false}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://trader:change-me@postgres:5432/trader}
      REDIS_URL: ${REDIS_URL:-redis://:change-me@redis:6379/0}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data:
