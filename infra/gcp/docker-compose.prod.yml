services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      SECRET_MANAGER_ENABLED: ${SECRET_MANAGER_ENABLED:-false}
      TRADING_MODE: "OFF"
      LIVE_ARMED: "false"
      KITE_AUTH_ENABLED: ${KITE_AUTH_ENABLED:-false}
      KITE_API_KEY: ${KITE_API_KEY:-}
      KITE_API_SECRET: ${KITE_API_SECRET:-}
      KITE_REDIRECT_URL: ${KITE_REDIRECT_URL:-}
      KITE_SESSION_ENCRYPTION_KEY: ${KITE_SESSION_ENCRYPTION_KEY:-}
      OPERATOR_AUTH_TOKEN: ${OPERATOR_AUTH_TOKEN:-}
      MARKET_DATA_ENABLED: "${MARKET_DATA_ENABLED:-false}"
      INSTRUMENT_SYNC_ENABLED: "${INSTRUMENT_SYNC_ENABLED:-false}"
      KITE_WEBSOCKET_ENABLED: "${KITE_WEBSOCKET_ENABLED:-false}"
      MARKET_DATA_WATCHLIST: "${MARKET_DATA_WATCHLIST:-NSE:NIFTYBEES,NSE:SBIN}"
      MARKET_DATA_MODE: "${MARKET_DATA_MODE:-quote}"
      MARKET_DATA_MAX_INSTRUMENTS: "${MARKET_DATA_MAX_INSTRUMENTS:-10}"
      MARKET_DATA_STALE_AFTER_SECONDS: "${MARKET_DATA_STALE_AFTER_SECONDS:-10}"
      MARKET_DATA_CANDLE_INTERVAL: "${MARKET_DATA_CANDLE_INTERVAL:-1minute}"
    ports:
      - "127.0.0.1:${APP_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3).read()\""]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
